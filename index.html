<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#F8FAFC" />
    <title>PlanFlow AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            }
          }
        },
        safelist: [
          {
            pattern: /bg-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(50|100|200|500|600|700)/,
            variants: ['hover', 'active', 'group-active', 'selection', 'after', 'before']
          },
          {
            pattern: /text-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(200|400|500|600|700|900)/,
            variants: ['hover', 'active', 'group-active', 'group-hover', 'selection']
          },
          {
            pattern: /border-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(50|100|200|300|500)/,
            variants: ['focus', 'active', 'focus-within']
          },
          {
            pattern: /ring-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(500)/,
            variants: ['focus']
          },
          {
            pattern: /shadow-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(100|200|500|600)/,
            variants: ['hover']
          },
          {
            pattern: /from-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(50|100|500)/
          },
          {
            pattern: /to-(indigo|blue|emerald|rose|amber|violet|slate|teal|cyan|fuchsia|pink|orange)-(50|100|500)/
          }
        ]
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
        background-color: #f8fafc;
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      * {
        transition-property: background-color, border-color, color, fill, stroke, transform, box-shadow;
        transition-duration: 200ms;
      }

      /* 安全区域 - 状态栏和底部导航栏 */
      .pt-safe-top {
        padding-top: env(safe-area-inset-top, 24px);
      }
      .pb-safe-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .mt-safe-top {
        margin-top: env(safe-area-inset-top, 24px);
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 antialiased h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
