server:
  port: 3001
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/planflow
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT Configuration
jwt:
  secret: your-super-secret-jwt-key-at-least-256-bits-long-for-hs256
  refresh-secret: your-refresh-token-secret-at-least-256-bits-long
  access-token-expiry: 900000      # 15 minutes in milliseconds
  refresh-token-expiry: 604800000  # 7 days in milliseconds

# CORS - 开发时允许所有来源，生产环境需要限制
cors:
  allowed-origins: "*"
